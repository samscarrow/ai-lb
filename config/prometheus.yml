# config/prometheus.yml
# Prometheus scrape configuration for ai-lb.
# Include this in your Prometheus config, or use as a standalone config:
#   prometheus --config.file=config/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - "alerting/ai-lb.yml"

scrape_configs:
  - job_name: 'ai-lb'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scheme: http
