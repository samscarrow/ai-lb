# config/alertmanager.yml
# Alertmanager configuration for LLB.
# Customize receivers for your notification channels.
# Reference: docs/ds7-production-deployment-spec.md §3.4

route:
  group_by: ['alertname', 'node']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Add your notification receiver here (e.g., Slack, PagerDuty, email)
    # Example Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/...'
    #     channel: '#alerts'

  - name: 'critical'
    # Critical alerts: same as default unless you want escalation
    # Example: separate PagerDuty key for criticals
