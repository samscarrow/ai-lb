# config/alerting/llb.yml
# Prometheus alerting rules for LLB.
# Reference: docs/ds7-production-deployment-spec.md §3.4

groups:
  - name: llb
    interval: 30s
    rules:

      # ── Error rate ────────────────────────────────────────────────────────
      - alert: LLBHighErrorRate
        expr: |
          (
            rate(llb_failovers_total[2m]) /
            rate(llb_requests_total[2m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LLB error rate above 5% for 2+ minutes"
          description: >
            Error rate is {{ printf "%.1f" (mul 100 $value) }}% over the last 2 minutes.
            Check backend health and circuit breaker state.
          runbook: "docs/ds7-production-deployment-spec.md §4.5 — Circuit Breaker Manual Reset"

      # ── Circuit breaker ───────────────────────────────────────────────────
      - alert: LLBCircuitBreakerOpen
        expr: llb_circuit_breaker_open == 1
        for: 60s
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open on node {{ $labels.node }} for >60s"
          description: >
            Node {{ $labels.node }} circuit breaker has been open for over 60 seconds.
            The node may be permanently degraded or has not recovered within cooldown period.
          runbook: "docs/ds7-production-deployment-spec.md §4.5 — Circuit Breaker Manual Reset"

      # ── All nodes down ────────────────────────────────────────────────────
      - alert: LLBAllNodesUnhealthy
        expr: count(llb_up == 1) == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: All LLB backend nodes are unhealthy"
          description: >
            No healthy nodes available. LLB is unable to serve requests.
            All requests will return 503.
          runbook: "docs/ds7-production-deployment-spec.md §4.1 — Cold Start"

      # ── EWMA token cost anomaly ────────────────────────────────────────────
      # Detects a node's EWMA output tokens exceeding 3x the median across nodes.
      # Indicates runaway verbose responses or model misbehavior on a specific node.
      - alert: LLBEwmaTokenCostAnomaly
        expr: |
          (
            llb_ewma_output_tokens
            /
            quantile(0.5, llb_ewma_output_tokens)
          ) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "EWMA token output anomaly on node {{ $labels.node }}"
          description: >
            Node {{ $labels.node }} EWMA output tokens is {{ printf "%.0f" $value }}x
            the median across nodes for model {{ $labels.model }}.
            May indicate verbose backend responses inflating cost estimates.

      # ── No traffic (dead man's switch) ───────────────────────────────────
      - alert: LLBNoTraffic
        expr: rate(llb_requests_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLB has received no requests in 5 minutes"
          description: >
            No requests have been routed through LLB in the last 5 minutes.
            Check if the service is reachable and if upstream clients are healthy.

      # ── High P99 latency ─────────────────────────────────────────────────
      - alert: LLBHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(llb_latency_seconds_bucket[5m]))
          ) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLB P99 latency above 10 seconds"
          description: >
            P99 request latency is {{ printf "%.1f" $value }}s, exceeding 10s threshold.
            Check backend node latencies and REQUEST_TIMEOUT_SECS config.
